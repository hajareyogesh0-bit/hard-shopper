<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Shopper</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.navbar{
    background:#222;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.cart{
    font-size:20px;
}

.hero{
    background:linear-gradient(135deg,#007bff,#00c6ff);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:50px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:12px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    text-align:center;
    padding:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:15px 0;
}

.price{
    color:green;
    font-size:22px;
    margin-bottom:15px;
}

.btn{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover{
    background:#218838;
}

.summary{
    text-align:center;
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">🛍 Hard Shopper</div>

    <div class="cart">
        🛒 Cart:
        <span id="cartCount">0</span>
    </div>
</nav>

<section class="hero">
    <h1>Welcome to Hard Shopper</h1>
    <p>Best Deals • Best Prices • Fast Delivery</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://picsum.photos/300/200?1">
        <h3>Wireless Headphones</h3>
        <div class="price">₹1999</div>

        <button class="btn"
            onclick="addToCart(1999)">
            Add To Cart
        </button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?2">
        <h3>Smart Watch</h3>
        <div class="price">₹2999</div>

        <button class="btn"
            onclick="addToCart(2999)">
            Add To Cart
        </button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?3">
        <h3>Gaming Mouse</h3>
        <div class="price">₹999</div>

        <button class="btn"
            onclick="addToCart(999)">
            Add To Cart
        </button>
    </div>

</section>

<div class="summary">

    <h2>Cart Summary</h2>

    <p>
        Total Items:
        <strong id="items">0</strong>
    </p>

    <p>
        Total Price:
        <strong>₹<span id="total">0</span></strong>
    </p>

</div>

<footer>
    © 2026 Hard Shopper | Built with HTML, CSS & JavaScript
</footer>

<script>

let count = 0;
let totalPrice = 0;

function addToCart(price){

    count++;
    totalPrice += price;

    document.getElementById("cartCount").innerText = count;

    document.getElementById("items").innerText = count;

    document.getElementById("total").innerText = totalPrice;

    alert("Product Added To Cart");
}

</script>

</body>
</html>
