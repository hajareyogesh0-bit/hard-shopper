<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard-Shopper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🛒 Hard-Shopper</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to Hard-Shopper</h2>
        <p>Your One-Stop Online Store</p>
    </section>

    <section class="products">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Wireless Headphones</h3>
            <p>₹1,999</p>
            <button onclick="addToCart('Wireless Headphones')">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Smart Watch</h3>
            <p>₹3,499</p>
            <button onclick="addToCart('Smart Watch')">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Gaming Mouse</h3>
            <p>₹999</p>
            <button onclick="addToCart('Gaming Mouse')">
                Add to Cart
            </button>
        </div>

    </section>

    <footer>
        <p>© 2026 Hard-Shopper. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
